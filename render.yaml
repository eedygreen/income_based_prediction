services:
  - type: web
    name: census-income-api
    runtime: python
    plan: free
    branch: main
    autoDeploy: false
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.3
